<section id="contact" aria-labelledby="contact-title" class="contact">
  <div class="contact__intro">
    <p class="contact__eyebrow">Scrapbook CTA · conversa aberta</p>
    <h2 id="contact-title">Open to conversations · aberta a conversas</h2>
    <p class="contact__summary">
      Science, writing, ideas, collaborations · ciência, escrita, ideias e colaborações.
    </p>

  </div>

  <div class="contact__actions scrapbook-paper scrapbook-pin-note scrapbook-ribbon-top">
    <p class="contact__actions-title">Science, writing, ideas, collaborations</p>
    <a class="contact-action contact-action--primary" [href]="mailtoHref">
      Open to conversations · aberta a conversas
    </a>
    <a class="contact-action" [href]="linkedInUrl" target="_blank" rel="noopener noreferrer">
      LinkedIn profile · perfil LinkedIn
    </a>
  </div>
</section>
