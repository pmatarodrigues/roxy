<a class="skip-link" href="#main-content">Skip to main content</a>

<header class="site-header" id="top">
  <div class="site-header__inner">
    <a href="/#top" class="site-header__brand">
      <span class="site-header__name">Adriana Carneiro</span>
      <span class="site-header__tag">PhD</span>
    </a>

    <nav aria-label="Portfolio sections" class="site-nav">
      <ul class="site-nav__list">
        @for (link of sectionLinks; track link.id) {
          <li>
            <a [href]="'/#' + link.id" class="site-nav__anchor">{{ link.label }}</a>
          </li>
        }
      </ul>
    </nav>
  </div>
</header>

<main id="main-content" class="page-main" tabindex="-1">
  <router-outlet></router-outlet>
</main>

<footer class="site-footer">
  <div class="site-footer__inner">
    <p>© {{ currentYear }} Adriana Carneiro · Portugal</p>
    <a href="/#top" class="site-footer__top">↑ Top</a>
  </div>
</footer>
