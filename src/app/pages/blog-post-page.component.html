<section class="blog-post">
  <div class="blog-post__inner">
    <a class="blog-post__back" [routerLink]="'/' + i18n.lang()">{{ 'blog.back' | translate }}</a>

    @if (post$ | async; as post) {
      <header class="blog-post__header">
        @if (post.cover) {
          <img class="blog-post__cover" [src]="post.cover" [alt]="post.title" loading="eager" decoding="async" />
        }
        <p class="blog-post__date">{{ formatDate(post.date) }}</p>
        <h1>{{ post.title }}</h1>
        <p class="blog-post__excerpt">{{ post.excerpt }}</p>
        @if (post.hero) {
          <img class="blog-post__hero" [src]="post.hero" [alt]="post.title" loading="eager" decoding="async" />
        }
      </header>

      <article class="blog-post__content" [innerHTML]="post.html"></article>
    } @else {
      <h1>{{ 'blog.not_found' | translate }}</h1>
      <p>{{ 'blog.unavailable' | translate }}</p>
    }
  </div>
</section>
